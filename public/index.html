<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>コメント</title>

<style>
body { background:black; overflow:hidden; }

.comment {
  position:absolute;
  white-space:nowrap;
  color:white;
  font-size:24px;
  animation: move 15s linear;
}

@keyframes move {
  from { left:100%; }
  to { left:-100%; }
}
<style>
body { background:black; overflow:hidden; }

.comment {
  position:absolute;
  white-space:nowrap;
  color:white;
  font-size:24px;
  animation: move 15s linear;
}

@keyframes move {
  from { left:100%; }
  to { left:-100%; }
}

/* 🔥 ここに追加 */
#history-box {
  position: fixed;
  right: 10px;
  top: 10px;
  width: 260px;
  height: 400px;
  background: rgba(0,0,0,0.8);
  border: 2px solid white;
  border-radius: 10px;
  padding: 10px;
  color: white;
}

#history {
  height: 90%;
  overflow-y: auto;
}

#input-box {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  border: 2px solid white;
  border-radius: 10px;
  padding: 10px;
}
</style>
/* 🔥 ここに入れる（重要） */
#history {
  position: fixed;
  right: 0;
  top: 0;
  width: 250px;
  height: 100%;
  background: rgba(0,0,0,0.7);
  color: white;
  overflow-y: auto;
  padding: 10px;
  font-size: 14px;
}
</style>

</head>

<body>

<div id="history-box">
  <h3>コメント履歴</h3>
  <div id="history"></div>
</div>

<div id="input-box">
  <input id="msg" placeholder="コメント">
  <button onclick="send()">送信</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

function send() {
  const msg = document.getElementById("msg").value;
  socket.emit("comment", msg);
}

socket.on("comment", (msg) => {

  // 流れるコメント
  const div = document.createElement("div");
  div.className = "comment";
  div.style.top = Math.random()*90 + "%";
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 5000);

  // 🔥 履歴に追加（これが無かった）
  const history = document.getElementById("history");
  const item = document.createElement("div");
  item.textContent = msg;
  history.prepend(item);
});
</script>

</body>
</html>
